version: '3.8'

services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-inference
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1
      - CUDA_VISIBLE_DEVICES=0,1
      - NCCL_P2P_DISABLE=1
      - VLLM_SKIP_P2P_CHECK=1
    volumes:
      - ~/models:/models:ro
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    ports:
      - "127.0.0.1:8000:8000"
    command:
      - "--model"
      - "/models/qwen3.6-35b-a3b-awq"
      - "--tensor-parallel-size"
      - "2"
      - "--dtype"
      - "bfloat16"
      - "--quantization"
      - "awq_marlin"
      - "--max-model-len"
      - "32768"
      - "--max-num-seqs"
      - "2"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--enforce-eager"
      - "--disable-custom-all-reduce"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--host"
      - "0.0.0.0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    restart: unless-stopped

  # Optional: Open WebUI for chat interface
